version: "3.9"

# SmartHealth Hub — production overrides.
# Extend the base compose file:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  web:
    environment:
      - NODE_ENV=production
    restart: always
    # Remove dev volume mount in production
    volumes: []

  api:
    environment:
      - ENVIRONMENT=production
    restart: always
    # Remove dev volume mount in production
    volumes: []
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --proxy-headers
      --forwarded-allow-ips="*"

  celery-worker:
    restart: always
    volumes: []
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4

  db:
    restart: always
    # In production, do NOT expose port to host — access via nginx/internal network only
    ports: []

  redis:
    restart: always
    # In production, bind to internal network only
    ports: []

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TODO: Mount SSL certificates here
    depends_on:
      - web
      - api
    restart: always
